name: Build and Release

on:
  push:
    tags:
      - 'v*'          # triggers on version tags like v1.3, v2.0
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

jobs:
  # -------------------------------------------------------------------
  # macOS build — produces dlmc-video-downloader.pkg
  # -------------------------------------------------------------------
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Download yt-dlp and ffmpeg
        run: |
          mkdir -p bin
          curl -L -o bin/yt-dlp \
            "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos"
          chmod +x bin/yt-dlp

          curl -L -o /tmp/ffmpeg.zip \
            "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/snapshot/ffmpeg.zip"
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg-extract
          mv /tmp/ffmpeg-extract/ffmpeg bin/ffmpeg
          chmod +x bin/ffmpeg

      - name: Build .app with PyInstaller
        run: |
          export MACOSX_DEPLOYMENT_TARGET=10.13
          python -m PyInstaller --clean --noconfirm dlmc-video-downloader.spec

      - name: Package .pkg
        run: |
          PKG_STAGE=$RUNNER_TEMP/pkg-stage
          mkdir -p "$PKG_STAGE/Applications"
          cp -R dist/dlmc-video-downloader.app "$PKG_STAGE/Applications/"

          pkgbuild --analyze --root "$PKG_STAGE" /tmp/component.plist
          /usr/libexec/PlistBuddy -c "Set :0:BundleIsRelocatable false" /tmp/component.plist

          pkgbuild \
            --root "$PKG_STAGE" \
            --component-plist /tmp/component.plist \
            --identifier com.dlmc.video-downloader \
            --version 3.1 \
            --install-location / \
            dlmc-video-downloader.pkg

      - name: Upload pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: dlmc-video-downloader.pkg

  # -------------------------------------------------------------------
  # Windows build — produces dlmc-video-downloader-setup.exe
  # -------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Download yt-dlp
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" `
                            -OutFile bin\yt-dlp.exe

      - name: Download ffmpeg
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" `
                            -OutFile "$env:TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:TEMP\ffmpeg.zip" -DestinationPath "$env:TEMP\ffmpeg-extract" -Force
          $ffmpegBin = Get-ChildItem -Path "$env:TEMP\ffmpeg-extract" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $ffmpegBin.FullName bin\ffmpeg.exe

      - name: Build with PyInstaller
        run: python -m PyInstaller --clean --noconfirm dlmc-video-downloader-windows.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Package installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" dlmc-video-downloader.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: Output\dlmc-video-downloader-setup.exe

  # -------------------------------------------------------------------
  # Release — attaches both artifacts to a GitHub Release
  # -------------------------------------------------------------------
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-pkg

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DLMC Video Downloader ${{ github.ref_name }}
          body: |
            ## DLMC Video Downloader ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `dlmc-video-downloader.pkg` |
            | Windows (x64) | `dlmc-video-downloader-setup.exe` |

            ### Install
            - **macOS:** Double-click the `.pkg` and follow the prompts
            - **Windows:** Run the `-setup.exe` installer

            Powered by [yt-dlp](https://github.com/yt-dlp/yt-dlp) and [ffmpeg](https://ffmpeg.org).
          files: |
            dlmc-video-downloader.pkg
            dlmc-video-downloader-setup.exe
